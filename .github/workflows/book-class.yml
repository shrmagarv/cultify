name: Auto Book Cult Class

on:
  schedule:
    - cron: '5 10 * * *'
  workflow_dispatch:

jobs:
  book-class:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Run booking script
        env:
          CURL_COMMAND: ${{ secrets.CURL_COMMAND }}
        run: bun index.js

